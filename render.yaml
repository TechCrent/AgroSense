# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Web service runs Django from Backend/. After first deploy, add secrets in the dashboard
# (SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, API keys — see Backend/.env.example).
#
# Database: omit DATABASE_URL for SQLite on the instance, or set Internal URL from Render Postgres.

services:
  - type: web
    name: agrosense-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn agri_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
