# Render Blueprint: https://render.com/docs/blueprint-spec
# Database: SQLite by default — do NOT set DATABASE_URL. Migrations create Backend/db.sqlite3 at build time.
# Optional: add a Render PostgreSQL instance and set DATABASE_URL to its Internal Database URL if you need Postgres.
# Set secrets: SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS, API keys (see Backend/.env.example).

services:
  - type: web
    name: agrosense-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: Backend
    # Use pip here (simplest on Render). If you switch to Pipenv, use pipenv run for migrate + gunicorn — see docs/DEPLOYMENT.md.
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn agri_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
