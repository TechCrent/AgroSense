# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Prerequisites: docs/DEVELOPMENT.md (local verify) before first deploy.
#
# After first deploy: Web Service → Environment → add secrets from Backend/.env.example
# (SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, API keys). Redeploy.
#
# Database: leave DATABASE_URL unset for SQLite, or link Render Postgres and set DATABASE_URL.

services:
  - type: web
    name: agrosense-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn agri_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
