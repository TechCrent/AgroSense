# Render Blueprint — https://render.com/docs/blueprint-spec
# Before deploying: complete docs/DEVELOPMENT.md and npm run verify locally.
# DB: omit DATABASE_URL for SQLite, or set Internal URL from Render Postgres.
# Env: see docs/DEPLOYMENT.md and Backend/.env.example

services:
  - type: web
    name: agrosense-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput
    startCommand: gunicorn agri_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
